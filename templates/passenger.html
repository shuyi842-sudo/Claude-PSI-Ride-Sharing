<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>乘客端 - 无人驾驶拼车</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            padding: 10px;
        }

        .container {
            max-width: 500px;
            padding: 10px;
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .form-group label {
            font-size: 0.95rem;
        }

        .form-group input {
            font-size: 16px;
            padding: 14px 16px;
        }

        .verification-code {
            font-size: 2rem;
            letter-spacing: 4px;
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            margin: 15px 0;
        }

        .match-details {
            font-size: 0.95rem;
        }

        .match-details p {
            margin: 8px 0;
            padding: 0;
        }

        .match-details strong {
            display: inline-block;
            width: 80px;
            font-weight: normal;
        }

        .copy-code-btn {
            background: rgba(102, 126, 234, 0.1);
            border: 1px dashed #667eea;
            color: #667eea;
            padding: 8px 16px;
            border-radius: 6px;
            margin: 10px auto;
            text-align: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .copy-code-btn:active {
            background: rgba(102, 126, 234, 0.2);
        }

        .copy-code-btn.copied {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #4caf50;
        }

        .quick-start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .quick-start-btn:active {
            opacity: 0.9;
        }

        .location-suggestions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .location-tag {
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .location-tag:active, .location-tag.selected {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #2196f3;
        }

        .status-tips {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
        }

        .status-tips h4 {
            margin: 0 0 8px 0;
            color: #f57c00;
        }

        .status-tips p {
            margin: 4px 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-link">🏠 首页</a>
            <h1>👤 我要拼车</h1>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 15px;">📍 出行信息</h2>

            <!-- 快速选择 -->
            <div class="location-suggestions" id="locationSuggestions">
                <div class="location-tag" onclick="selectLocation('中关村', '西站')">🏢 北京中关村 → 西站</div>
                <div class="location-tag" onclick="selectLocation('科技园', '地铁站')">🏭 科技园 → 地铁站</div>
                <div class="location-tag" onclick="selectLocation('大学城', '商业中心')">🎓 大学城 → 商业中心</div>
                <div class="location-tag" onclick="selectLocation('机场T3', '市区')">✈️ 机场T3 → 市区</div>
            </div>

            <form id="passengerForm">
                <div class="form-group">
                    <label for="passengerId">👤 你的乘客ID（手机号后4位）</label>
                    <input type="text" id="passengerId" placeholder="例如：P8888" required maxlength="8" pattern="[A-Z0-9]+" inputmode="text">
                    <p class="hint">用于生成验证码，方便车辆端确认</p>
                </div>

                <div class="form-group">
                    <label for="startLocation">🚩 出发地</label>
                    <input type="text" id="startLocation" placeholder="输入起点" required>
                </div>

                <div class="form-group">
                    <label for="endLocation">🎯 目的地</label>
                    <input type="text" id="endLocation" placeholder="输入目的地" required>
                </div>

                <button type="submit" class="btn btn-primary" id="matchBtn" style="font-size: 1.1rem; padding: 16px;">
                    <span>🔍 开始匹配车辆</span>
                </button>
            </form>
        </div>

        <div id="resultSection" class="card hidden">
            <div id="resultContent"></div>
        </div>

        <!-- 提示信息 -->
        <div class="status-tips">
            <h4>💡 使用提示</h4>
            <p>1. 选择或输入相同的地点区域更容易匹配到车辆</p>
            <p>2. 匹配成功后，保存6位验证码</p>
            <p>3. 上车时向车辆端出示验证码</p>
            <p>4. 如需取消，点击"取消匹配"释放座位</p>
        </div>
    </div>

    <script>
        let currentPassengerId = null;
        let matchedVehicleId = null;
        let matchCode = '';

        // 快速选择地点
        function selectLocation(start, end) {
            document.getElementById('startLocation').value = start;
            document.getElementById('endLocation').value = end;

            // 高亮选中的标签
            document.querySelectorAll('.location-tag').forEach(tag => tag.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        // 生成随机乘客ID
        function generatePassengerId() {
            const random = Math.floor(1000 + Math.random() * 9000);
            return 'P' + random;
        }

        // 自动生成乘客ID
        document.getElementById('passengerId').value = generatePassengerId();

        // 表单提交
        document.getElementById('passengerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const passengerId = document.getElementById('passengerId').value;
            const start = document.getElementById('startLocation').value;
            const end = document.getElementById('endLocation').value;
            const matchBtn = document.getElementById('matchBtn');
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');

            currentPassengerId = passengerId;

            try {
                matchBtn.disabled = true;
                matchBtn.innerHTML = '<span class="loading"></span> 正在匹配...';

                // 注册乘客
                await fetch('/passenger/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        passenger_id: passengerId,
                        start: start,
                        end: end
                    })
                });

                // 请求匹配
                const response = await fetch('/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ passenger_id: passengerId })
                });

                const result = await response.json();
                matchBtn.disabled = false;
                matchBtn.innerHTML = '<span>🔍 开始匹配车辆</span>';

                resultSection.classList.remove('hidden');

                if (result.success) {
                    matchedVehicleId = result.vehicle.id;
                    matchCode = result.match_code;

                    resultContent.innerHTML = `
                        <div class="success-message" style="text-align: center;">
                            <div style="font-size: 4rem; margin-bottom: 10px;">🎉</div>
                            <h3 style="font-size: 1.3rem;">匹配成功！</h3>

                            <div class="match-details">
                                <p><strong>你的ID：</strong><span style="color: #667eea;">${passengerId}</span></p>
                                <p><strong>车辆ID：</strong>${result.vehicle.id}</p>
                                <p><strong>车辆路线：</strong>${result.vehicle.start} → ${result.vehicle.end}</p>
                                <p><strong>剩余座位：</strong>${result.vehicle.seats}个</p>
                            </div>

                            <div class="verification-code">${result.match_code}</div>

                            <div class="copy-code-btn" onclick="copyCode()">
                                📋 点击复制验证码
                            </div>

                            <p style="margin-top: 15px; color: #666;">
                                ⚠️ 请保存此验证码，上车时需要出示
                            </p>

                            <button class="btn btn-danger" id="cancelBtn" style="margin-top: 15px; width: 100%;">
                                <span>✕ 取消匹配</span>
                            </button>
                        </div>
                    `;
                    document.getElementById('cancelBtn').addEventListener('click', cancelMatch);
                } else {
                    matchedVehicleId = null;
                    resultContent.innerHTML = `
                        <div class="error-message" style="text-align: center;">
                            <div style="font-size: 3rem;">😔</div>
                            <h3>${result.message}</h3>
                            <p>提示：选择与已有车辆相同的地点区域更容易匹配</p>
                            <button class="btn btn-secondary" onclick="tryAgain()" style="margin-top: 15px; width: 100%;">
                                <span>🔄 重新尝试</span>
                            </button>
                        </div>
                    `;
                }
            } catch (error) {
                matchBtn.disabled = false;
                matchBtn.innerHTML = '<span>🔍 开始匹配车辆</span>';
                resultSection.classList.remove('hidden');
                resultContent.innerHTML = `
                    <div class="error-message">
                        <h3>❌ 连接失败</h3>
                        <p>请检查：</p>
                        <p>1. 电脑服务器是否正在运行</p>
                        <p>2. 手机和电脑是否在同一WiFi</p>
                    </div>
                `;
            }
        });

        // 复制验证码
        function copyCode() {
            navigator.clipboard.writeText(matchCode).then(() => {
                const btn = document.querySelector('.copy-code-btn');
                btn.textContent = '✅ 已复制！';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 点击复制验证码';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = matchCode;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('验证码: ' + matchCode);
            });
        }

        // 重新尝试
        function tryAgain() {
            document.getElementById('resultSection').classList.add('hidden');
        }

        // 取消匹配
        async function cancelMatch() {
            if (!currentPassengerId) return;

            const cancelBtn = document.getElementById('cancelBtn');
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');

            if (!confirm('确定要取消匹配吗？')) return;

            try {
                cancelBtn.disabled = true;
                cancelBtn.innerHTML = '<span class="loading" style="border-color: #f44336; border-top-color: transparent;"></span> 取消中...';

                const response = await fetch('/cancel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ passenger_id: currentPassengerId })
                });

                const result = await response.json();
                matchedVehicleId = null;
                matchCode = '';

                resultContent.innerHTML = `
                    <div class="success-message" style="text-align: center;">
                        <div style="font-size: 3rem;">✓</div>
                        <h3>已取消匹配</h3>
                        <p>座位已释放，您可以重新发起匹配</p>
                        <button class="btn btn-primary" onclick="tryAgain()" style="margin-top: 15px; width: 100%;">
                            <span>🔍 重新匹配</span>
                        </button>
                    </div>
                `;
            } catch (error) {
                cancelBtn.disabled = false;
                cancelBtn.innerHTML = '<span>✕ 取消匹配</span>';
                alert('取消失败，请重试');
            }
        }
    </script>
</body>
</html>
